# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Black Duck Security Action allows you to integrate Static Analysis Security Testing (SAST) and Software Composition Analysis (SCA) into your CI/CD pipelines.
# For more information about configuring your workflow,
# read our documentation at https://github.com/blackduck-inc/black-duck-security-scan

name: CI Black Duck security scan

on:
  push:
    branches: [ "1.0.0" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "1.0.0" ]
  schedule:
    - cron: '40 5 * * 2'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Black Duck SCA scan
        uses: blackduck-inc/black-duck-security-scan@805cbd09e806b01907bbea0f990723c2bb85abe9
        with:
          ### ---------- POLARIS SCANNING: REQUIRED FIELDS ----------
          polaris_server_url: "https://poc.polaris.blackduck.com/"
          polaris_access_token: "i6lnkpoj8l69l2bp3m3g6ukj1g27gu8dj2pknbdrbnjffbej2a9pjai5ac97b0v21e5gdqv069ioc"
          polaris_assessment_types: "SAST"
          polaris_application_name: "bje-NodeGoat"
          polaris_project_name: "NodeGoat"
          polaris_reports_sarif_create: 'true'
          polaris_upload_sarif_report: 'true'
          polaris_prComment_enabled: 'true'
          polaris_prComment_severities: "Critical, High, Medium, Low"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
